name: Build and Package APR

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Frontend (Vite)
        run: npm run build

      - name: Prepare Deployment Package
        run: |
          mkdir deploy_package
          # คัดลอก frontend ที่ build แล้ว (dist) ไว้ในโฟลเดอร์ root ของ package
          cp -r dist/* deploy_package/
          # คัดลอก api folder
          cp -r api deploy_package/api
          # สร้างโฟลเดอร์ uploads เปล่าๆ พร้อมไฟล์ .gitkeep
          mkdir -p deploy_package/uploads
          touch deploy_package/uploads/.gitkeep
          
          # Zip ไฟล์ทั้งหมดเพื่อเตรียมให้ผู้ใช้ดาวน์โหลด
          cd deploy_package
          zip -r ../apr-production-ready.zip ./*

      - name: Upload Production Artifact
        uses: actions/upload-artifact@v4
        with:
          name: APR-Production-Ready
          path: apr-production-ready.zip
          retention-days: 7
